<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tic-Tac-Toe - Jogo da Velha com Inteligência Artificial</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <!-- MediaPipe Hands para deteção de gestos via câmara -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Menu Principal -->
    <div id="menu-screen" class="screen active">
        <div class="container">
            <h1 class="title">AI <span>TIC-TAC-TOE</span></h1>
            <p class="subtitle">Jogo da Velha com Inteligência Artificial Adaptativa</p>

            <div class="settings">
                <h3>Dificuldade da IA</h3>
                <div class="difficulty-buttons">
                    <button class="btn-diff" data-diff="easy">
                        <span class="diff-icon">😊</span>
                        <span class="diff-name">Fácil</span>
                        <span class="diff-desc">IA comete erros</span>
                    </button>
                    <button class="btn-diff active-diff" data-diff="medium">
                        <span class="diff-icon">🧠</span>
                        <span class="diff-name">Médio</span>
                        <span class="diff-desc">IA equilibrada</span>
                    </button>
                    <button class="btn-diff" data-diff="hard">
                        <span class="diff-icon">🤖</span>
                        <span class="diff-name">Impossível</span>
                        <span class="diff-desc">Minimax perfeito</span>
                    </button>
                    <button class="btn-diff" data-diff="adaptive">
                        <span class="diff-icon">📈</span>
                        <span class="diff-name">Adaptativo</span>
                        <span class="diff-desc">Aprende o teu estilo</span>
                    </button>
                </div>

                <h3>Modo de Jogo</h3>
                <div class="mode-buttons">
                    <button class="btn-mode active-mode" data-mode="classic">3x3 Clássico</button>
                    <button class="btn-mode" data-mode="5x5">5x5 (4 em linha)</button>
                    <button class="btn-mode" data-mode="ultimate">Ultimate (9 tabuleiros)</button>
                </div>
            </div>

            <button id="btn-play" class="btn-primary">JOGAR</button>

            <div class="ai-badge">🧠 Minimax + Alpha-Beta | Visão Computacional (MediaPipe) | ML Adaptativo</div>
        </div>
    </div>

    <!-- Ecrã de Jogo -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <div class="game-header">
                <div class="player-info player-x">
                    <span class="player-symbol">X</span>
                    <span class="player-name">Tu</span>
                    <span id="player-score" class="player-score">0</span>
                </div>
                <div class="turn-indicator">
                    <span id="turn-text">Tua vez</span>
                    <div id="ai-thinking" class="ai-thinking hidden">
                        <div class="thinking-dots"><span></span><span></span><span></span></div>
                        <span>IA a pensar...</span>
                    </div>
                </div>
                <div class="player-info player-o">
                    <span class="player-symbol">O</span>
                    <span class="player-name">IA</span>
                    <span id="ai-score" class="player-score">0</span>
                </div>
            </div>

            <div id="board-container" class="board-container">
                <!-- Tabuleiro gerado por JS -->
            </div>

            <!-- Câmara e cursor de mão -->
            <div id="camera-container" class="camera-container">
                <video id="camera-feed" autoplay playsinline></video>
                <canvas id="camera-canvas"></canvas>
                <div id="hand-cursor" class="hand-cursor"></div>
                <div id="gesture-indicator" class="gesture-indicator">
                    <span id="gesture-text">Aponta para uma célula</span>
                </div>
                <div id="confirm-progress" class="confirm-progress">
                    <div id="confirm-fill" class="confirm-fill"></div>
                </div>
            </div>

            <div class="game-footer">
                <div id="ai-comment" class="ai-comment"></div>
                <div class="game-actions">
                    <button id="btn-restart" class="btn-small">Reiniciar</button>
                    <button id="btn-back-menu" class="btn-small">Menu</button>
                </div>
                <div class="stats-bar">
                    <span>Nível IA: <strong id="ai-level">Médio</strong></span>
                    <span>Jogos: <strong id="games-played">0</strong></span>
                    <span>Empates: <strong id="draws-count">0</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Resultado -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <div id="result-ai-insight" class="ai-insight"></div>
            <div class="modal-buttons">
                <button id="btn-play-again" class="btn-primary">Jogar Novamente</button>
                <button id="btn-result-menu" class="btn-secondary">Menu</button>
            </div>
        </div>
    </div>

    <script src="js/ai.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
